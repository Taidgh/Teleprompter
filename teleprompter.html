<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teleprompter</title>
<style>
  :root{
    --bg-app:#141416;
    --bg-panel:#1c1c1f;
    --bg-field:#0f0f11;
    --border:#2b2b30;
    --text:#e8e8ea;
    --text-dim:#8a8a90;
    --accent:#e2b93b;
    --accent-dim:#5a4a1c;
    --danger:#c1554d;
    --prompter-bg:#1a1a1a;
    --prompter-text:#ffffff;
  }
  html[data-theme="light"]{
    --bg-app:#f4f4f2;
    --bg-panel:#ffffff;
    --bg-field:#eeeeec;
    --border:#dcdcd8;
    --text:#1c1c1e;
    --text-dim:#6c6c70;
    --accent:#b8860b;
    --accent-dim:#e8d9a8;
    --danger:#b23b33;
    /* --prompter-bg and --prompter-text are intentionally NOT overridden here —
       the fullscreen prompter always stays dark-grey/white regardless of app theme. */
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg-app); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    overflow:hidden;
  }
  #app{ display:flex; height:100vh; }

  /* ---------- LIBRARY (left) ---------- */
  #library{
    width:290px; min-width:290px;
    background:var(--bg-panel);
    border-right:1px solid var(--border);
    display:flex; flex-direction:column;
  }
  #library h1{
    font-size:13px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--text-dim); font-weight:600;
    padding:18px 16px 10px;
    margin:0;
    display:flex; align-items:center; gap:8px;
  }
  #library h1 .dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 8px var(--accent);
  }
  #folder-row{
    margin:0 12px 10px;
    padding:9px 10px;
    background:var(--bg-field);
    border:1px solid var(--border);
    border-radius:6px;
    font-size:11.5px;
    color:var(--text-dim);
    display:flex;
    align-items:center;
    gap:8px;
  }
  #folder-row .fname{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--text); }
  #folder-row button{
    background:none; border:none; color:var(--accent); cursor:pointer; font-size:11.5px; padding:0;
  }
  #script-list{
    flex:1; overflow-y:auto;
    padding:4px 8px;
  }
  .script-item{
    padding:10px 10px;
    border-radius:6px;
    cursor:pointer;
    margin-bottom:2px;
    display:flex; flex-direction:column; gap:2px;
    border:1px solid transparent;
  }
  .script-item:hover{ background:#242428; }
  .script-item.active{
    background:#242428;
    border-color:var(--accent-dim);
  }
  .script-item .title{ font-size:13.5px; font-weight:500; color:var(--text); }
  .script-item .meta{ font-size:11px; color:var(--text-dim); }
  .script-item .row{ display:flex; justify-content:space-between; align-items:center; }
  .script-item .del{
    color:var(--text-dim); font-size:11px; opacity:0;
    padding:2px 6px; border-radius:4px;
  }
  .script-item:hover .del{ opacity:1; }
  .script-item .del:hover{ color:var(--danger); background:#2a1e1d; }
  #library-empty{
    padding:6px 16px 16px; color:var(--text-dim); font-size:12.5px; line-height:1.5;
  }
  .lib-actions{
    display:flex; gap:8px;
    margin:10px 12px 14px;
  }
  .lib-btn{
    flex:1;
    padding:9px;
    background:transparent;
    border:1px dashed var(--border);
    color:var(--text-dim);
    border-radius:6px;
    font-size:12px;
    cursor:pointer;
  }
  .lib-btn:hover{ border-color:var(--accent-dim); color:var(--text); }

  /* ---------- EDITOR (center) ---------- */
  #editor{
    flex:1;
    display:flex; flex-direction:column;
    min-width:0;
  }
  #editor-top{
    padding:16px 24px;
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:12px;
  }
  #title-input{
    flex:1;
    background:var(--bg-field);
    border:1px solid var(--border);
    color:var(--text);
    font-size:15px;
    padding:9px 12px;
    border-radius:6px;
    outline:none;
  }
  #title-input:focus{ border-color:var(--accent-dim); }
  #title-input::placeholder{ color:var(--text-dim); }

  button{ font-family:inherit; }
  .btn{
    background:var(--bg-field);
    border:1px solid var(--border);
    color:var(--text);
    padding:9px 16px;
    border-radius:6px;
    font-size:13px;
    cursor:pointer;
    white-space:nowrap;
  }
  .btn:hover{ border-color:#3d3d44; }
  .btn-primary{
    background:var(--accent);
    border-color:var(--accent);
    color:#1a1502;
    font-weight:600;
  }
  .btn-primary:hover{ filter:brightness(1.08); }
  .btn:disabled{ opacity:.4; cursor:not-allowed; }

  #save-status{ font-size:12px; color:var(--text-dim); min-width:120px; }

  #mode-banner{
    display:none;
    background:#241d0d;
    border-bottom:1px solid var(--accent-dim);
    color:#d9b968;
    font-size:12px;
    padding:8px 24px;
    line-height:1.5;
  }
  #mode-banner.show{ display:block; }

  #script-text{
    flex:1;
    resize:none;
    background:var(--bg-app);
    border:none;
    outline:none;
    color:var(--text);
    font-size:17px;
    line-height:1.7;
    padding:24px 28px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  #script-text::placeholder{ color:var(--text-dim); }

  #editor-bottom{
    border-top:1px solid var(--border);
    padding:14px 24px;
    display:flex; align-items:center; gap:22px;
    flex-wrap:wrap;
  }
  .ctrl-group{ display:flex; align-items:center; gap:8px; }
  .ctrl-label{ font-size:11.5px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.05em; }
  input[type=range]{ width:110px; accent-color:var(--accent); }
  .ctrl-value{ font-size:12px; color:var(--text-dim); width:34px; }
  #spacer{ flex:1; }
  input[type=color]{
    width:30px; height:26px;
    border:1px solid var(--border);
    border-radius:5px;
    background:none;
    padding:2px;
    cursor:pointer;
  }
  #voice-hint{
    font-size:11px; color:var(--text-dim); padding:0 24px 10px;
    margin-top:-8px;
  }
  #voice-hint code{
    background:var(--bg-field); border:1px solid var(--border);
    padding:1px 5px; border-radius:4px; color:var(--text);
  }

  /* ---------- TELEPROMPTER (fullscreen) ---------- */
  #prompter{
    position:fixed; inset:0;
    background:var(--prompter-bg);
    display:none;
    z-index:1000;
    overflow:hidden;
  }
  #prompter.active{ display:block; }
  #prompter-viewport{ position:absolute; inset:0; overflow:hidden; }
  #prompter-scroll{ position:absolute; left:0; right:0; padding:0 8% 100vh; will-change:transform; }
  #prompter-scroll p{
    color:var(--prompter-text);
    font-weight:600;
    text-align:center;
    white-space:pre-wrap;
    margin:0;
  }
  #center-line{
    position:absolute; left:0; right:0; top:38%;
    height:1px;
    background:rgba(226,185,59,.28);
    pointer-events:none;
  }
  #prompter-hud{
    position:absolute; bottom:0; left:0; right:0;
    padding:16px 24px 20px;
    background:linear-gradient(to top, rgba(0,0,0,.75), transparent);
    display:flex; align-items:center; gap:20px;
    opacity:1;
    transition:opacity .4s ease;
    flex-wrap:wrap;
  }
  #prompter-hud.hidden{ opacity:0; pointer-events:none; }
  #prompter-hud .btn{ background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.16); color:#fff; }
  #prompter-hud .btn:hover{ background:rgba(255,255,255,.16); }
  #prompter-hud .ctrl-label, #prompter-hud .ctrl-value{ color:rgba(255,255,255,.55); }
  #prompter-title{
    position:absolute; top:18px; left:24px;
    color:rgba(255,255,255,.35);
    font-size:12px; letter-spacing:.04em;
    transition:opacity .4s ease;
  }
  #prompter-title.hidden{ opacity:0; }
</style>
</head>
<body>
<div id="app">

  <div id="library">
    <h1><span class="dot"></span>Scripts</h1>
    <div id="folder-row">
      <span class="fname" id="folder-name">No folder connected</span>
      <button id="folder-btn">Choose…</button>
    </div>
    <div id="script-list"></div>
    <div class="lib-actions">
      <button class="lib-btn" id="new-btn">+ New</button>
      <button class="lib-btn" id="import-btn">↑ Import file</button>
    </div>
    <input type="file" id="file-input" accept="application/json" style="display:none" multiple>
  </div>

  <div id="editor">
    <div id="mode-banner"></div>
    <div id="editor-top">
      <input id="title-input" type="text" placeholder="Untitled script" maxlength="80">
      <span id="save-status"></span>
      <button class="btn" id="theme-toggle" title="Toggle light / dark mode">🌙</button>
      <button class="btn" id="save-btn">Save</button>
    </div>
    <textarea id="script-text" placeholder="Paste or write your script here..."></textarea>
    <div id="voice-hint">Wrap notes-to-self in <code>&lt;voice&gt;like this&lt;/voice&gt;</code> — they'll show in the picked color on the prompter, tags hidden, so the speaker knows not to read them aloud.</div>
    <div id="editor-bottom">
      <div class="ctrl-group">
        <span class="ctrl-label">Speed</span>
        <input type="range" id="speed-range" min="10" max="200" value="60">
        <span class="ctrl-value" id="speed-value">60</span>
      </div>
      <div class="ctrl-group">
        <span class="ctrl-label">Font size</span>
        <input type="range" id="size-range" min="24" max="120" value="52">
        <span class="ctrl-value" id="size-value">52</span>
      </div>
      <div class="ctrl-group">
        <span class="ctrl-label">Note color</span>
        <input type="color" id="note-color" value="#ff4fd8">
      </div>
      <div id="spacer"></div>
      <button class="btn btn-primary" id="start-btn">▶ Start teleprompter</button>
    </div>
  </div>

</div>

<div id="prompter">
  <div id="prompter-title"></div>
  <div id="prompter-viewport">
    <div id="center-line"></div>
    <div id="prompter-scroll"><p id="prompter-p"></p></div>
  </div>
  <div id="prompter-hud">
    <button class="btn" id="exit-btn">✕ Exit</button>
    <button class="btn" id="playpause-btn">⏸ Pause</button>
    <button class="btn" id="restart-btn">⟲ Restart</button>
    <div class="ctrl-group">
      <span class="ctrl-label">Speed</span>
      <input type="range" id="p-speed-range" min="10" max="200" value="60">
      <span class="ctrl-value" id="p-speed-value">60</span>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Font size</span>
      <input type="range" id="p-size-range" min="24" max="120" value="52">
      <span class="ctrl-value" id="p-size-value">52</span>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Note color</span>
      <input type="color" id="p-note-color" value="#ff4fd8">
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Mirror</span>
      <button class="btn" id="mirror-h-btn" style="padding:6px 10px;">⇋</button>
      <button class="btn" id="mirror-v-btn" style="padding:6px 10px;">⇅</button>
    </div>
  </div>
</div>

<script>
(function(){
  const folderRow = document.getElementById('folder-row');
  const folderName = document.getElementById('folder-name');
  const folderBtn = document.getElementById('folder-btn');
  const scriptList = document.getElementById('script-list');
  const titleInput = document.getElementById('title-input');
  const scriptText = document.getElementById('script-text');
  const saveBtn = document.getElementById('save-btn');
  const themeToggle = document.getElementById('theme-toggle');
  const newBtn = document.getElementById('new-btn');
  const importBtn = document.getElementById('import-btn');
  const fileInput = document.getElementById('file-input');
  const saveStatus = document.getElementById('save-status');
  const modeBanner = document.getElementById('mode-banner');
  const speedRange = document.getElementById('speed-range');
  const sizeRange = document.getElementById('size-range');
  const noteColor = document.getElementById('note-color');
  const startBtn = document.getElementById('start-btn');

  const prompter = document.getElementById('prompter');
  const prompterP = document.getElementById('prompter-p');
  const prompterScroll = document.getElementById('prompter-scroll');
  const prompterViewport = document.getElementById('prompter-viewport');
  const prompterTitle = document.getElementById('prompter-title');
  const hud = document.getElementById('prompter-hud');
  const exitBtn = document.getElementById('exit-btn');
  const playPauseBtn = document.getElementById('playpause-btn');
  const restartBtn = document.getElementById('restart-btn');
  const pSpeedRange = document.getElementById('p-speed-range');
  const pSizeRange = document.getElementById('p-size-range');
  const pNoteColor = document.getElementById('p-note-color');
  const mirrorHBtn = document.getElementById('mirror-h-btn');
  const mirrorVBtn = document.getElementById('mirror-v-btn');

  const HAS_FS_ACCESS = 'showDirectoryPicker' in window;

  let scripts = {};       // id -> {id, title, text, updated, fileHandle?, filename}
  let currentId = null;
  let dirHandle = null;

  function uid(){ return 's' + Date.now() + Math.random().toString(36).slice(2,7); }
  function slugify(s){
    return (s||'untitled').toLowerCase().trim()
      .replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'') || 'untitled';
  }
  function escapeHtml(str){
    return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  // Turns literal <voice>...</voice> markup the user typed into colored,
  // tag-free spans for the fullscreen prompter (never spoken aloud).
  function renderPrompterHtml(raw, color){
    const escaped = escapeHtml(raw);
    return escaped.replace(/&lt;voice&gt;([\s\S]*?)&lt;\/voice&gt;/gi,
      (m, inner) => `<span class="voice-note" style="color:${color}">${inner}</span>`);
  }

  // ---------- tiny IndexedDB helper to remember the chosen folder handle ----------
  function idbGet(key){
    return new Promise((resolve)=>{
      const req = indexedDB.open('teleprompter-db', 1);
      req.onupgradeneeded = ()=> req.result.createObjectStore('handles');
      req.onsuccess = ()=>{
        const tx = req.result.transaction('handles','readonly');
        const g = tx.objectStore('handles').get(key);
        g.onsuccess = ()=> resolve(g.result || null);
        g.onerror = ()=> resolve(null);
      };
      req.onerror = ()=> resolve(null);
    });
  }
  function idbSet(key, val){
    return new Promise((resolve)=>{
      const req = indexedDB.open('teleprompter-db', 1);
      req.onupgradeneeded = ()=> req.result.createObjectStore('handles');
      req.onsuccess = ()=>{
        const tx = req.result.transaction('handles','readwrite');
        tx.objectStore('handles').put(val, key);
        tx.oncomplete = ()=> resolve(true);
        tx.onerror = ()=> resolve(false);
      };
      req.onerror = ()=> resolve(false);
    });
  }

  function setBanner(msg){
    if(!msg){ modeBanner.classList.remove('show'); modeBanner.textContent=''; return; }
    modeBanner.textContent = msg;
    modeBanner.classList.add('show');
  }

  // ---------------- theme (light/dark) ----------------
  function applyTheme(t){
    document.documentElement.setAttribute('data-theme', t);
    themeToggle.textContent = t === 'light' ? '🌙' : '☀️';
    themeToggle.title = t === 'light' ? 'Switch to dark mode' : 'Switch to light mode';
  }
  async function initTheme(){
    const saved = await idbGet('theme');
    const theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    applyTheme(theme);
  }
  themeToggle.addEventListener('click', async ()=>{
    const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    applyTheme(next);
    await idbSet('theme', next);
  });

  // ---------------- init / mode detection ----------------
  async function init(){
    if(!HAS_FS_ACCESS){
      setBanner('This browser can\'t link a folder directly, so Save downloads a .json file (to your Downloads folder) and you can reload past scripts with "Import file". Chrome or Edge on the Mac support full folder sync.');
      renderList();
      return;
    }
    const saved = await idbGet('scriptsDir');
    if(saved){
      try{
        const perm = await saved.queryPermission({mode:'readwrite'});
        if(perm === 'granted'){
          dirHandle = saved;
          await loadFromFolder();
          return;
        } else {
          folderName.textContent = 'Click Choose… to reconnect your folder';
        }
      }catch(e){ /* handle stale, ignore */ }
    }
    renderList();
  }

  async function chooseFolder(){
    if(!HAS_FS_ACCESS){
      alert('Your browser doesn\'t support folder linking (Safari doesn\'t yet). Use Import file / Save (download) instead.');
      return;
    }
    try{
      const handle = await window.showDirectoryPicker({ id:'teleprompter-scripts', mode:'readwrite' });
      dirHandle = handle;
      await idbSet('scriptsDir', handle);
      await loadFromFolder();
    }catch(e){ /* user cancelled */ }
  }

  async function loadFromFolder(){
    folderName.textContent = dirHandle.name;
    scripts = {};
    currentId = null;
    scriptList.innerHTML = '<div id="library-empty">Reading folder…</div>';
    try{
      for await (const [name, handle] of dirHandle.entries()){
        if(handle.kind !== 'file' || !name.endsWith('.json')) continue;
        try{
          const file = await handle.getFile();
          const text = await file.text();
          const data = JSON.parse(text);
          const id = data.id || uid();
          scripts[id] = { id, title: data.title || 'Untitled', text: data.text || '', updated: data.updated || file.lastModified, noteColor: data.noteColor, filename: name, fileHandle: handle };
        }catch(e){ /* skip unreadable file */ }
      }
    }catch(e){ /* permission revoked mid-flight etc */ }
    setBanner('');
    renderList();
    titleInput.value = ''; scriptText.value = ''; saveStatus.textContent='';
  }

  function renderList(){
    const ids = Object.keys(scripts).sort((a,b)=> (scripts[b].updated||0) - (scripts[a].updated||0));
    if(ids.length === 0){
      scriptList.innerHTML = '<div id="library-empty">No scripts yet. Write one and hit Save' + (dirHandle ? '' : ', or Import a previously saved file') + '.</div>';
      return;
    }
    scriptList.innerHTML = '';
    ids.forEach(id=>{
      const s = scripts[id];
      const el = document.createElement('div');
      el.className = 'script-item' + (id === currentId ? ' active' : '');
      const date = s.updated ? new Date(s.updated).toLocaleDateString(undefined,{month:'short',day:'numeric'}) : '';
      const wordCount = (s.text||'').trim().split(/\s+/).filter(Boolean).length;
      el.innerHTML = `
        <div class="row">
          <span class="title">${escapeHtml(s.title || 'Untitled')}</span>
          <span class="del" title="Delete">✕</span>
        </div>
        <span class="meta">${date} · ${wordCount} words</span>
      `;
      el.addEventListener('click', (e)=>{
        if(e.target.classList.contains('del')){ e.stopPropagation(); deleteScript(id); return; }
        loadScript(id);
      });
      scriptList.appendChild(el);
    });
  }

  function loadScript(id){
    const s = scripts[id];
    if(!s) return;
    currentId = id;
    titleInput.value = s.title || '';
    scriptText.value = s.text || '';
    saveStatus.textContent = '';
    syncNoteColor(s.noteColor || noteColor.value);
    renderList();
  }

  function newScript(){
    currentId = null;
    titleInput.value = '';
    scriptText.value = '';
    saveStatus.textContent = '';
    renderList();
    titleInput.focus();
  }

  async function deleteScript(id){
    const s = scripts[id];
    if(!confirm('Delete "' + (s.title || 'Untitled') + '"? This can\'t be undone.')) return;
    if(dirHandle && s.filename){
      try{ await dirHandle.removeEntry(s.filename); }catch(e){ alert('Could not delete the file from disk: ' + e.message); }
    }
    delete scripts[id];
    if(currentId === id) newScript(); else renderList();
  }

  async function saveScript(){
    const title = titleInput.value.trim() || 'Untitled script';
    const text = scriptText.value;
    if(!currentId) currentId = uid();
    const record = { id: currentId, title, text, updated: Date.now(), noteColor: noteColor.value };
    saveStatus.textContent = 'Saving…';

    if(dirHandle){
      // write straight to the linked folder
      let filename = (scripts[currentId] && scripts[currentId].filename) || (slugify(title) + '-' + currentId.slice(-5) + '.json');
      try{
        const handle = await dirHandle.getFileHandle(filename, { create:true });
        const writable = await handle.createWritable();
        await writable.write(JSON.stringify(record, null, 2));
        await writable.close();
        scripts[currentId] = { ...record, filename, fileHandle: handle };
        saveStatus.textContent = 'Saved to ' + dirHandle.name;
      }catch(e){
        saveStatus.textContent = 'Save failed';
        alert('Could not write to the folder: ' + e.message);
      }
    } else {
      // fallback: download a .json file
      scripts[currentId] = record;
      const blob = new Blob([JSON.stringify(record, null, 2)], { type:'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = slugify(title) + '.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      saveStatus.textContent = 'Downloaded';
    }
    setTimeout(()=>{ if(saveStatus.textContent.startsWith('Saved') || saveStatus.textContent==='Downloaded') saveStatus.textContent=''; }, 2200);
    renderList();
  }

  function importFiles(fileList){
    Array.from(fileList).forEach(file=>{
      const reader = new FileReader();
      reader.onload = ()=>{
        try{
          const data = JSON.parse(reader.result);
          const id = data.id || uid();
          scripts[id] = { id, title: data.title || file.name.replace(/\.json$/,''), text: data.text || '', updated: data.updated || Date.now(), noteColor: data.noteColor };
          renderList();
        }catch(e){ alert('"' + file.name + '" isn\'t a script file this app saved.'); }
      };
      reader.readAsText(file);
    });
  }

  saveBtn.addEventListener('click', saveScript);
  newBtn.addEventListener('click', newScript);
  folderBtn.addEventListener('click', chooseFolder);
  importBtn.addEventListener('click', ()=> fileInput.click());
  fileInput.addEventListener('change', (e)=>{ importFiles(e.target.files); fileInput.value=''; });
  titleInput.addEventListener('keydown', e=>{ if(e.key==='Enter') scriptText.focus(); });
  document.addEventListener('keydown', e=>{
    if((e.metaKey||e.ctrlKey) && e.key==='s'){ e.preventDefault(); saveScript(); }
  });

  // ---- shared speed/size sync between editor and prompter controls ----
  function syncSpeed(val){ speedRange.value = val; pSpeedRange.value = val; document.getElementById('speed-value').textContent = val; document.getElementById('p-speed-value').textContent = val; }
  function syncSize(val){ sizeRange.value = val; pSizeRange.value = val; document.getElementById('size-value').textContent = val; document.getElementById('p-size-value').textContent = val; prompterP.style.fontSize = val + 'px'; }
  function syncNoteColor(val){
    noteColor.value = val; pNoteColor.value = val;
    if(prompter.classList.contains('active')) prompterP.innerHTML = renderPrompterHtml(scriptText.value, val);
  }
  speedRange.addEventListener('input', e=> syncSpeed(e.target.value));
  pSpeedRange.addEventListener('input', e=> syncSpeed(e.target.value));
  sizeRange.addEventListener('input', e=> syncSize(e.target.value));
  pSizeRange.addEventListener('input', e=> syncSize(e.target.value));
  noteColor.addEventListener('input', e=> syncNoteColor(e.target.value));
  pNoteColor.addEventListener('input', e=> syncNoteColor(e.target.value));

  // ---------------- Teleprompter engine ----------------
  let rafId = null;
  let playing = false;
  let posY = 0;
  let lastTs = null;
  let hudTimer = null;
  let mirrorH = false, mirrorV = false;

  function speedPxPerSec(){ return Number(pSpeedRange.value) * 1.4; }

  function startPrompter(){
    if(!scriptText.value.trim()){ alert('Write or load some script text first.'); return; }
    prompterP.innerHTML = renderPrompterHtml(scriptText.value, noteColor.value);
    prompterTitle.textContent = titleInput.value.trim() || 'Untitled script';
    prompterP.style.fontSize = sizeRange.value + 'px';
    pSizeRange.value = sizeRange.value; document.getElementById('p-size-value').textContent = sizeRange.value;
    pSpeedRange.value = speedRange.value; document.getElementById('p-speed-value').textContent = speedRange.value;
    pNoteColor.value = noteColor.value;

    prompter.classList.add('active');
    posY = prompterViewport.clientHeight * 0.38;
    prompterScroll.style.transform = `translateY(${posY}px)`;
    playing = true;
    playPauseBtn.textContent = '⏸ Pause';
    lastTs = null;
    if(document.documentElement.requestFullscreen){ document.documentElement.requestFullscreen().catch(()=>{}); }
    rafId = requestAnimationFrame(tick);
    armHudTimer();
  }

  function tick(ts){
    if(!playing){ lastTs = null; return; }
    if(lastTs === null) lastTs = ts;
    const dt = (ts - lastTs) / 1000;
    lastTs = ts;
    posY -= speedPxPerSec() * dt;
    prompterScroll.style.transform = `translateY(${posY}px)`;
    const totalHeight = prompterP.getBoundingClientRect().height;
    if(posY < -(totalHeight)){ playing = false; playPauseBtn.textContent = '▶ Play'; return; }
    rafId = requestAnimationFrame(tick);
  }

  function togglePlay(){
    playing = !playing;
    playPauseBtn.textContent = playing ? '⏸ Pause' : '▶ Play';
    if(playing){ lastTs = null; rafId = requestAnimationFrame(tick); }
    armHudTimer();
  }

  function restartPrompter(){
    posY = prompterViewport.clientHeight * 0.38;
    prompterScroll.style.transform = `translateY(${posY}px)`;
    playing = true;
    playPauseBtn.textContent = '⏸ Pause';
    lastTs = null;
    cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(tick);
    armHudTimer();
  }

  function exitPrompter(){
    playing = false;
    cancelAnimationFrame(rafId);
    prompter.classList.remove('active');
    if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});
    clearTimeout(hudTimer);
    hud.classList.remove('hidden');
    prompterTitle.classList.remove('hidden');
  }

  function armHudTimer(){
    hud.classList.remove('hidden');
    prompterTitle.classList.remove('hidden');
    clearTimeout(hudTimer);
    if(playing){
      hudTimer = setTimeout(()=>{ hud.classList.add('hidden'); prompterTitle.classList.add('hidden'); }, 2200);
    }
  }

  prompterViewport.addEventListener('mousemove', armHudTimer);
  prompterViewport.addEventListener('click', ()=>{ if(hud.classList.contains('hidden')) armHudTimer(); });

  startBtn.addEventListener('click', startPrompter);
  exitBtn.addEventListener('click', exitPrompter);
  playPauseBtn.addEventListener('click', togglePlay);
  restartBtn.addEventListener('click', restartPrompter);

  mirrorHBtn.addEventListener('click', ()=>{ mirrorH = !mirrorH; mirrorHBtn.style.borderColor = mirrorH ? 'var(--accent)' : ''; applyMirror(); });
  mirrorVBtn.addEventListener('click', ()=>{ mirrorV = !mirrorV; mirrorVBtn.style.borderColor = mirrorV ? 'var(--accent)' : ''; applyMirror(); });
  function applyMirror(){ prompterViewport.style.transform = `scaleX(${mirrorH ? -1 : 1}) scaleY(${mirrorV ? -1 : 1})`; }

  document.addEventListener('keydown', (e)=>{
    if(!prompter.classList.contains('active')) return;
    if(e.key === ' '){ e.preventDefault(); togglePlay(); }
    else if(e.key === 'Escape'){ exitPrompter(); }
    else if(e.key === 'ArrowUp'){ e.preventDefault(); pSpeedRange.value = Math.min(200, Number(pSpeedRange.value)+5); syncSpeed(pSpeedRange.value); }
    else if(e.key === 'ArrowDown'){ e.preventDefault(); pSpeedRange.value = Math.max(10, Number(pSpeedRange.value)-5); syncSpeed(pSpeedRange.value); }
  });

  document.addEventListener('fullscreenchange', ()=>{
    if(!document.fullscreenElement && prompter.classList.contains('active')) exitPrompter();
  });

  init();
  initTheme();
})();
</script>
</body>
</html>
